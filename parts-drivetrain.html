<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Parts | AUAPW</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-mount"></div>

<div style="min-height:100vh;background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);padding-top:56px">
  <div style="background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);border-bottom:1px solid var(--silver-lt)">
    <div class="metal-line"></div>
    <div class="container" style="padding-top:3rem;padding-bottom:2.5rem">
      <div class="breadcrumb">
        <a href="index.html">Home</a><span>/</span>
        <a href="parts.html">Parts</a><span>/</span>
        <span id="breadcrumb-label"></span>
      </div>
      <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:.75rem">
        <span id="cat-icon" style="font-size:3rem;color:var(--silver-lt)"></span>
        <h1 id="page-heading" class="display-md" style="font-size:clamp(1.75rem,4vw,3.5rem);color:var(--ink)"></h1>
      </div>
      <p id="page-desc" style="font-size:14px;color:var(--steel);max-width:620px"></p>
    </div>
  </div>

  <div style="background:#CCCCCC;border-bottom:1px solid var(--silver-lt);padding:1.25rem 0">
    <div class="container">
      <div style="background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);border:1px solid var(--silver-lt);border-radius:2px;padding:1.25rem 1.5rem">
        <form id="search-form">
          <div class="search-grid">
            <div><label class="input-label">Year</label><select name="year" class="input"><option value="">Select Year</option></select></div>
            <div><label class="input-label">Make</label><select name="make" class="input"><option value="">Select Make</option></select></div>
            <div><label class="input-label">Model</label><select name="model" class="input" disabled><option value="">Select Make First</option></select></div>
            <div><label class="input-label">Part Type</label><select name="part" class="input" disabled><option value="">Select Model First</option></select></div>
          </div>
          <div style="margin-top:.75rem"><button type="submit" class="btn btn-primary">🔍 Search This Part</button></div>
        </form>
      </div>
    </div>
  </div>

  <div class="container" style="padding-top:3rem;padding-bottom:4rem">
    <div style="display:grid;grid-template-columns:1fr 280px;gap:2.5rem;align-items:start" id="content-grid">
      <div>
        <h2 style="font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);margin-bottom:1.25rem" id="parts-heading"></h2>
        <div class="grid-2" id="parts-list"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="sidebar-panel">
          <div style="padding:.875rem 1.25rem;background:#CCCCCC;border-bottom:1px solid var(--silver-lt)">
            <span style="font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)">Popular Makes</span>
          </div>
          <div style="padding:.5rem 0" id="makes-sidebar"></div>
        </div>
        <div class="sidebar-dark">
          <div class="metal-line" style="margin-bottom:1.25rem"></div>
          <h3 style="font-size:13px;font-weight:700;color:#fff;margin-bottom:.75rem">Why AUAPW?</h3>
          <div style="display:flex;flex-direction:column;gap:.625rem;margin-bottom:1.25rem">
            <span style="font-size:12px;color:#787878">🛡️ 6-Month Warranty</span>
            <span style="font-size:12px;color:#787878">🔍 2,000+ Verified Yards</span>
            <span style="font-size:12px;color:#787878">⚡ 24-Hour Response</span>
            <span style="font-size:12px;color:#787878">🚚 Ships Nationwide</span>
            <span style="font-size:12px;color:#787878">💰 Best Prices</span>
          </div>
          <a href="quote.html" class="btn btn-white" style="width:100%;font-size:.65rem;padding:.75rem">Get Free Quote</a>
        </div>
        <div class="card" style="padding:1.25rem;text-align:center;background:#CCCCCC">
          <p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);margin-bottom:.375rem">Have a Question?</p>
          <a href="tel:8888185001" class="display-md" style="font-size:1.3rem;color:var(--ink);text-decoration:none;display:block">(888) 818-5001</a>
          <p style="font-size:11px;color:var(--chrome);margin-top:.25rem">Mon–Sat 8am–6pm PST</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="_shared.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar('parts');
document.getElementById('footer-mount').innerHTML = renderFooter();

// Detect which category from URL or filename
const filename = location.pathname.split('/').pop().replace('.html','');
const catId = filename.replace('parts-','');
const cat = PART_CATEGORIES.find(c=>c.id===catId) || PART_CATEGORIES[0];

document.getElementById('page-title').textContent = `Used ${cat.label} | AUAPW`;
document.getElementById('breadcrumb-label').textContent = cat.label;
document.getElementById('cat-icon').textContent = cat.icon;
document.getElementById('page-heading').textContent = `Used ${cat.label}`;
document.getElementById('page-desc').textContent = `Quality used ${cat.label.toLowerCase()} from 2,000+ verified yards. Every part includes a 6-month warranty and ships nationwide.`;
document.getElementById('parts-heading').textContent = `${cat.label} Types`;

initSearchForm('search-form');

// Parts list
const pl = document.getElementById('parts-list');
cat.parts.forEach(p => {
  pl.innerHTML += `
  <a href="search.html?part=${encodeURIComponent(p)}" class="part-card" style="display:flex;align-items:center;justify-content:space-between;text-decoration:none">
    <div><p style="font-size:14px;font-weight:600;color:var(--ink)">${p}</p><p style="font-size:11px;color:var(--chrome);margin-top:.125rem">All makes & models</p></div>
    <span style="color:var(--chrome);font-size:1rem;flex-shrink:0">→</span>
  </a>`;
});

// Makes sidebar
const ms = document.getElementById('makes-sidebar');
CAR_MAKES.slice(0,10).forEach(m => {
  ms.innerHTML += `<a href="makes.html" style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.25rem;font-size:13px;color:var(--steel);text-decoration:none;transition:all .2s" onmouseover="this.style.background='var(--off-white)';this.style.color='var(--ink)'" onmouseout="this.style.background='';this.style.color='var(--steel)'">${m}<span style="opacity:.4">→</span></a>`;
});

// Responsive
function fixGrid(){const g=document.getElementById('content-grid');if(g)g.style.gridTemplateColumns=window.innerWidth<860?'1fr':'1fr 280px'}
window.addEventListener('resize',fixGrid);fixGrid();
</script>
</body>
</html>
