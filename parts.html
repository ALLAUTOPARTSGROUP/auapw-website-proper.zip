<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>All Parts | AUAPW</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-mount"></div>

<div style="min-height:100vh;background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);padding-top:56px">
  <div style="background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);border-bottom:1px solid var(--silver-lt)">
    <div class="metal-line"></div>
    <div class="container" style="padding-top:3.5rem;padding-bottom:3rem">
      <div class="section-eye"><div class="eye-line"></div><span class="eyebrow">Browse Inventory</span></div>
      <h1 class="display-md" style="font-size:clamp(1.75rem,4vw,4rem);color:var(--ink)">All Parts</h1>
      <p style="margin-top:.75rem;font-size:14px;color:var(--steel);max-width:540px">Every component your vehicle needs — sourced from 2,000+ verified yards nationwide. 6-month warranty on every part.</p>
    </div>
  </div>

  <div style="background:#CCCCCC;border-bottom:1px solid var(--silver-lt);padding:1.25rem 0">
    <div class="container">
      <div style="background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);border:1px solid var(--silver-lt);border-radius:2px;padding:1.25rem 1.5rem">
        <form id="search-form">
          <div class="search-grid">
            <div><label class="input-label">Year</label><select name="year" class="input"><option value="">Select Year</option></select></div>
            <div><label class="input-label">Make</label><select name="make" class="input"><option value="">Select Make</option></select></div>
            <div><label class="input-label">Model</label><select name="model" class="input" disabled><option value="">Select Make First</option></select></div>
            <div><label class="input-label">Part Type</label><select name="part" class="input" disabled><option value="">Select Model First</option></select></div>
          </div>
          <div style="margin-top:.75rem"><button type="submit" class="btn btn-primary">🔍 Search Parts</button></div>
        </form>
      </div>
    </div>
  </div>

  <div class="container" style="padding-top:3.5rem;padding-bottom:4rem">
    <div class="grid-3" id="parts-grid"></div>
  </div>

  <div style="background:var(--ink);padding:3.5rem 0;position:relative">
    <div class="metal-line" style="position:absolute;top:0;left:0;right:0"></div>
    <div class="container" style="text-align:center">
      <h2 class="display-md" style="font-size:1.75rem;color:#fff;margin-bottom:.75rem">Can't find your part?</h2>
      <p style="font-size:13px;color:#787878;margin-bottom:2rem">Call our team — we can source from additional yards not listed here.</p>
      <a href="tel:8888185001" class="btn btn-white">📞 (888) 818-5001</a>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="_shared.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar('parts');
document.getElementById('footer-mount').innerHTML = renderFooter();
initSearchForm('search-form');

const grid = document.getElementById('parts-grid');
PART_CATEGORIES.forEach(cat => {
  const tagsHtml = cat.parts.map(p => `<a href="search.html?part=${encodeURIComponent(p)}" class="tag" style="cursor:pointer;text-decoration:none;display:inline-block">${p}</a>`).join('');
  grid.innerHTML += `
  <a href="parts-${cat.id}.html" class="part-card" style="text-decoration:none;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <span style="font-size:2rem;color:var(--silver)">${cat.icon}</span>
      <span style="color:var(--chrome);font-size:1.1rem">→</span>
    </div>
    <h2 style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:.375rem">${cat.label}</h2>
    <p style="font-size:12px;color:var(--chrome);margin-bottom:1rem">${cat.parts.length} types available</p>
    <div class="tags" style="margin-top:auto">${tagsHtml}</div>
  </a>`;
});
</script>
</body>
</html>
