<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search Results | AUAPW</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-mount"></div>

<div style="min-height:100vh;background:linear-gradient(160deg,#E8E8E8 0%,#DEDEDE 40%,#E4E4E4 60%,#D8D8D8 100%);padding-top:56px">
  <div class="container" style="padding-top:3.5rem;padding-bottom:3rem">
    <div class="section-eye"><div class="eye-line"></div><span class="eyebrow">Search Results</span></div>
    <h1 class="display-md" style="font-size:clamp(1.75rem,4vw,4rem);color:var(--ink)">Available Parts</h1>
  </div>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem">
    <div id="results-grid" class="grid-4"></div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="_shared.js"></script>
<script>
document.getElementById('navbar-mount').innerHTML = renderNavbar();
document.getElementById('footer-mount').innerHTML = renderFooter();

const sp = new URLSearchParams(window.location.search);
const year = sp.get('year'), make = sp.get('make'), model = sp.get('model'), part = sp.get('part');
const results = generateResults(year, make, model, part);

const grid = document.getElementById('results-grid');
results.forEach(r => {
  grid.innerHTML += `
  <div class="card" style="padding:1.5rem;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--ink)">${part}</div>
        <div style="font-size:11px;color:var(--chrome);margin-top:2px">${r.yard.name}</div>
      </div>
      <div style="background:linear-gradient(135deg,#1e1e1e 0%,#2d2d2d 100%);color:#fff;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700">$${r.price}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;border-bottom:1px solid #C0C0C0;padding-bottom:1rem">
      <div><span style="font-size:10px;color:var(--chrome);text-transform:uppercase">Condition</span><div style="font-size:13px;font-weight:600;color:var(--ink)">${r.condition}</div></div>
      <div><span style="font-size:10px;color:var(--chrome);text-transform:uppercase">Warranty</span><div style="font-size:13px;font-weight:600;color:var(--ink)">${r.warranty}</div></div>
      <div><span style="font-size:10px;color:var(--chrome);text-transform:uppercase">Miles</span><div style="font-size:13px;font-weight:600;color:var(--ink)">${r.miles.toLocaleString()}</div></div>
      <div><span style="font-size:10px;color:var(--chrome);text-transform:uppercase">Status</span><div style="font-size:13px;font-weight:600;color:${r.inStock?'#2d6a2d':'#7a3333'}">${r.inStock?'In Stock':'Backordered'}</div></div>
    </div>
    <a href="quote.html" class="btn btn-primary" style="margin-top:auto;width:100%">Request Quote</a>
  </div>`;
});
</script>
</body>
</html>
